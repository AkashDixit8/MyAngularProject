<div class="card">

    <img [src]="product.image" [alt]="product.name">

    <div class="card-body">

        <h2>{{ product.name }}</h2>

        <p class="description">
            {{ product.description }}
        </p>

        <h3>₹{{ product.price }}</h3>

        <button (click)="addToCart()">
            Add To Cart
        </button>

    </div>

</div>
