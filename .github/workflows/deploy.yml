name: building and deploying angular application

on:
  push:
    branches: [main]

permissions: 
     contents: read
     pages: write
     id-token: write

jobs:
      build:
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: warforged

        steps:
         - name: checkout repository
           uses: actions/checkout@v7.0.0
         - name: Setup node js 
           uses: actions/setup-node@v6.5.0
           with:
               node-version: 22.x
               cache: 'npm'
               cache-dependency-path: warforged/package-lock.json
         - name: Install dependencies
           run: npm ci
         - name: creating the build
           run: npm run build -- --base-href /MyAngularProject/
         - name: uploading pages artifact
           uses: actions/upload-pages-artifact@v5.0.0
           with:
                path: warforged/dist/warforged/browser/
         - name: configure github pages
           uses: actions/configure-pages@v6.0.0
      deploy: 
          runs-on: ubuntu-latest
          needs: build
          environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
      
          steps:
                - name: deploy github
                  id: deployment
                  uses: actions/deploy-pages@v3.0.2-node.24                
                 
            
           
        


               


          
              

          

    
    
